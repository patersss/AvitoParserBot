services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  api_core_service:
    build: ./ApiCoreService/
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: api_core_service_db
      DB_PORT: 5432
      DB_NAME: api_core_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN:-dev-service-token}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      EXPOSE_DEV_EMAIL_CODE: ${EXPOSE_DEV_EMAIL_CODE:-true}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Parser Monitor}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
    ports:
      - "8000:8000"
    depends_on:
      - api_core_service_db
      - rabbitmq
  
  api_core_service_db:
    image: postgres:15
    container_name: api_core_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_core_db
    volumes:
      - api_core_db:/var/lib/postgresql/data

  parser_service:
    build: ./ParserService/
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: parsing_service_db
      DB_PORT: 5432
      DB_NAME: parser_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
    depends_on:
      - parsing_service_db
      - rabbitmq
      - api_core_service
      - notification_service

  parsing_service_db:
    image: postgres:15
    container_name: parsing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parser_db
    volumes:
      - parser_db:/var/lib/postgresql/data

  notification_service:
    build: ./NotificationService/
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: notification_service_db
      DB_PORT: 5432
      DB_NAME: notification_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NOTIFICATION_EXCHANGE: notification.events
      NOTIFICATION_EVENTS_QUEUE: notification.events
      LISTING_FOUND_ROUTING_KEY: listing.found
      NOTIFICATION_CHANNEL_ROUTING_KEY: notification.channel.upserted
      NOTIFICATION_CHANNEL_DELETED_ROUTING_KEY: notification.channel.deleted
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
    depends_on:
      - notification_service_db
      - rabbitmq

  notification_service_db:
    image: postgres:15
    container_name: notification_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    volumes:
      - notification_db:/var/lib/postgresql/data
      
  bot_handle_service:
    build: ./BotService/
    restart: unless-stopped
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      API_CORE_BASE_URL: http://api_core_service:8000
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN:-dev-service-token}
      SITE_LOGIN_URL: ${SITE_LOGIN_URL:-http://localhost:3000/login?token={token}}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NOTIFICATION_EXCHANGE: notification.events
      NOTIFICATION_CHANNEL_ROUTING_KEY: notification.channel.upserted
    depends_on:
      - api_core_service
      - notification_service
      - rabbitmq

  web_client:
    build:
      context: ./webClient/
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api_core_service

volumes:
  parser_db:
  api_core_db:
  notification_db:
