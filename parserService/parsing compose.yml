services:
  parser_service:
    build: .
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: parsing_service_db
      DB_PORT: 5432
      DB_NAME: parser_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      AVITO_COOKIES: ${AVITO_COOKIE_HEADER}
    depends_on:
      - parsing_service_db
      - rabbitmq
    


  parsing_service_db:
    image: postgres:15
    container_name: parsing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parser_db
    volumes:
      - parser_db_test:/var/lib/postgresql/data
    ports:
      - "6001:5432"
  
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  parser_db_test: